stages:
  - setup
  - test
  - deploy

variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_INPUT: "1"
  MYSQL_DATABASE: "test"
  MYSQL_ROOT_PASSWORD: "mysql"
  MYSQL_USER: "django"
  MYSQL_PASSWORD: "mysql"
  MYSQL_HOST: "mysql"

default:
  image: python:3.13
  cache:
    paths:
      - .cache/pip
      - venv/

installation:
  stage: setup
  services:
    - mysql
  script:
    - python -V  # Print out python version for debugging
    - apt-get -qq update
    - apt-get -qq install -y python3-virtualenv python3-dev python3-pip gettext
    - ./Utils/setup.sh --ci

migrations:
  needs:
    - installation
  stage: test
  script:
    - source venv/bin/activate
    - ./manage.py makemigrations --dry-run --check

test:
  needs:
    - installation
  services:
    - mysql
  stage: test
  script:
    - source venv/bin/activate
    - apt-get -qq update
    - apt-get -qq install -y default-mysql-client default-libmysqlclient-dev
    - pip install pytest-cov
    - pip install -r requirements/test.txt
    - pip install -r requirements/mysql.txt
    - mysql --version
    - |
      for i in {1..30}; do
        if mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -h mysql --skip-ssl -e "SELECT 1" > /dev/null 2>&1; then
          echo "MySQL is ready"
          break
        fi
        echo "Waiting for MySQL... ($i/30)"
        sleep 2
      done
    - |
      mysql -u root -p"${MYSQL_ROOT_PASSWORD}" -h mysql --skip-ssl --execute="\
        CREATE USER IF NOT EXISTS '${MYSQL_USER}'@'%' IDENTIFIED BY '${MYSQL_PASSWORD}';\
        GRANT ALL PRIVILEGES ON *.* TO '${MYSQL_USER}'@'%' WITH GRANT OPTION;\
        FLUSH PRIVILEGES;\
      "
    - coverage run --source='.' manage.py test --settings AKPlanning.settings_ci
  after_script:
    - coverage report
    - coverage xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: unit.xml

lint:
  needs:
    - installation
  stage: test
  script:
    - mkdir -p public/badges public/lint
    - echo undefined > public/badges/$CI_JOB_NAME.score
    - source venv/bin/activate
    - pip install -r requirements/lint.txt
    - pylint --load-plugins pylint_django --django-settings-module=AKPlanning.settings_ci --rcfile pylintrc --exit-zero --output-format=text AK* | tee /tmp/pylint.txt
    - sed -n 's/^Your code has been rated at \([-0-9.]*\)\/.*/\1/p' /tmp/pylint.txt > public/badges/$CI_JOB_NAME.score
    - pylint --load-plugins pylint_django --django-settings-module=AKPlanning.settings_ci --rcfile pylintrc --exit-zero --output-format=pylint_gitlab.GitlabCodeClimateReporter AK* > codeclimate.json
    - pylint --load-plugins pylint_django --django-settings-module=AKPlanning.settings_ci --rcfile pylintrc --exit-zero --output-format=pylint_gitlab.GitlabPagesHtmlReporter AK* > public/lint/index.html
  after_script:
    - |
      echo "Linting score: $(cat public/badges/$CI_JOB_NAME.score)"
  artifacts:
    paths:
      - public
    reports:
      codequality: codeclimate.json
    when: always

doc:
  needs:
    - installation
  stage: test
  script:
    - source venv/bin/activate
    - pip install -r requirements/docs.txt
    - cd docs
    - make html
  artifacts:
    paths:
      - docs/_build/html

pages:
  stage: deploy
  image: alpine:latest
  script:
    - echo
  artifacts:
    paths:
      - public
  only:
    refs:
      - main
